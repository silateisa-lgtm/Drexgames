<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID - Immersive Unblocked Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#7000ff',
                        bgDark: '#050508',
                        surface: '#0f0f13',
                        surfaceHover: '#1a1a24',
                        border: '#1f1f27',
                        cardBg: 'rgba(25, 25, 35, 0.6)',
                        textDim: '#88888f',
                        brandGlow: 'rgba(112, 0, 255, 0.4)'
                    },
                    fontFamily: {
                        sans: ['"Helvetica Neue"', 'Arial', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-glow {
            text-shadow: 0 0 15px rgba(112, 0, 255, 0.4);
        }
        .immersive-gradient {
            background: radial-gradient(circle at top left, #120e1a 0%, #050508 100%);
        }
        body {
            background-color: #050508;
            color: #ececec;
        }
        iframe::focus { outline: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans antialiased">
    <!-- Top Nav -->
    <nav class="h-[70px] bg-surface border-b border-border flex items-center justify-between px-10 sticky top-0 z-50">
        <div class="flex items-center gap-3 cursor-pointer group" onclick="closeGame(); window.scrollTo(0,0)">
            <div class="w-8 h-8 bg-brand rounded shadow-[0_0_15px_rgba(112,0,255,0.4)] flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>
            </div>
            <span class="text-2xl font-black tracking-[4px] text-brand logo-glow">VOID</span>
        </div>

        <div class="hidden md:flex flex-1 max-w-lg mx-10 relative">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="absolute left-4 top-1/2 -translate-y-1/2 text-textDim"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input 
                id="search-input"
                type="text" 
                placeholder="Search for games..."
                oninput="onSearchInput(event)"
                class="w-full bg-[#1a1a24] border border-border rounded-lg py-2.5 pl-11 pr-10 text-sm focus:outline-none focus:border-brand/40 transition-colors placeholder:text-textDim"
            />
            <button onclick="clearSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-textDim hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="flex items-center gap-6">
            <div class="w-9 h-9 rounded-full bg-brand border-2 border-white/20 shadow-lg shadow-brand/20"></div>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="hidden lg:flex w-[240px] bg-surface border-right border-border flex-col p-8 overflow-y-auto no-scrollbar transition-all duration-300">
            <div class="text-[11px] uppercase tracking-[1.5px] text-textDim mb-6 font-bold">Menu</div>
            <div id="category-filters" class="space-y-1">
                <!-- Categories will be injected here -->
            </div>

            <div class="mt-12 text-[11px] uppercase tracking-[1.5px] text-textDim mb-6 font-bold">World Status</div>
            <div class="space-y-4">
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-[#00ff88]"></div>
                    <span class="text-sm text-[#ccc] font-medium">Hyperion (Active)</span>
                </div>
                <div class="flex items-center gap-3">
                    <div class="w-2 h-2 rounded-full bg-[#00ff88]"></div>
                    <span class="text-sm text-[#ccc] font-medium">Vortex (Online)</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto immersive-gradient p-10">
            
            <!-- LIST SECTION -->
            <div id="list-section" class="space-y-10">
                <div class="flex items-center justify-between">
                    <h2 class="text-2xl font-bold tracking-tight">Access Protocol</h2>
                    <div class="text-sm text-brand font-bold cursor-pointer hover:underline uppercase tracking-widest">v2.4.0.51</div>
                </div>

                <!-- Featured Hero -->
                <section class="relative rounded-2xl overflow-hidden aspect-[21/9] flex items-center px-12 group border border-border">
                    <div class="absolute inset-0 bg-gradient-to-r from-bgDark via-bgDark/20 to-transparent z-10"></div>
                    <img src="https://picsum.photos/seed/space-nebula/1200/600" alt="Hero" class="absolute inset-0 w-full h-full object-cover grayscale opacity-40 group-hover:scale-105 transition-transform duration-[2s]">
                    <div class="relative z-20 max-w-lg space-y-4">
                        <div class="flex items-center gap-2 text-brand font-bold text-xs uppercase tracking-widest leading-none">
                            <div class="w-8 h-[2px] bg-brand"></div>
                            Sector Featured
                        </div>
                        <h1 class="text-6xl font-black tracking-tighter text-white">VOID <span class="text-brand">6</span></h1>
                        <p class="text-textDim text-lg font-medium leading-relaxed max-w-sm">Deep space survival protocol. Master the silence.</p>
                        <button onclick="openGame('1')" class="bg-brand text-white px-10 py-3.5 rounded-lg font-bold shadow-[0_0_20px_rgba(112,0,255,0.4)] hover:scale-105 transition-transform uppercase tracking-widest text-xs">Initialize</button>
                    </div>
                </section>

                <!-- Grid -->
                <div id="game-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-20">
                    <!-- Games will be injected here -->
                </div>
            </div>

            <!-- VIEW SECTION -->
            <div id="view-section" class="hidden max-w-6xl mx-auto w-full space-y-8 pb-20 animate-[fadeIn_0.5s_ease-out]">
                <div class="w-full h-[75vh] rounded-2xl overflow-hidden bg-black border border-border relative group shadow-2xl">
                    <iframe id="game-iframe" src="" class="w-full h-full border-none" allowfullscreen></iframe>
                    
                    <!-- HUD -->
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3 p-1.5 bg-black/80 rounded-xl backdrop-blur-2xl border border-white/10 opacity-0 group-hover:opacity-100 transition-all duration-300">
                        <button onclick="closeGame()" class="p-2.5 hover:bg-white/10 rounded-lg transition-colors text-slate-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
                        </button>
                        <div class="w-[1px] h-5 bg-white/10"></div>
                        <button onclick="reloadGame()" class="p-2.5 hover:bg-white/10 rounded-lg transition-colors text-slate-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"></path><polyline points="21 3 21 8 16 8"></polyline></svg>
                        </button>
                        <button onclick="toggleFullScreen()" class="p-2.5 hover:bg-white/10 rounded-lg transition-colors text-slate-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
                        </button>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="flex items-start justify-between">
                        <div class="space-y-2">
                            <div class="flex items-center gap-3 text-[10px] font-bold uppercase tracking-[2px] text-brand">
                                <span id="game-cat-display">CATEGORY</span>
                                <span class="w-1 h-1 rounded-full bg-[#88888f]"></span>
                                <span class="text-textDim uppercase tracking-widest">Connection Stable</span>
                            </div>
                            <h2 id="game-title-display" class="text-4xl font-black text-white tracking-tighter">GAME TITLE</h2>
                        </div>
                        <button onclick="closeGame()" class="flex items-center gap-2 px-8 py-2.5 rounded-lg border border-border bg-surface hover:border-brand transition-all text-sm font-bold shadow-lg uppercase tracking-widest">
                            Disconnect
                        </button>
                    </div>
                    <p id="game-desc-display" class="text-textDim text-lg leading-relaxed max-w-3xl pr-12">Description goes here.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Stats Bar (Footer) -->
    <footer class="h-10 bg-surface border-t border-border flex items-center px-10 text-[11px] font-bold text-textDim gap-8 uppercase tracking-widest relative z-50">
        <div class="flex items-center gap-2">Protocol: <span class="text-[#00ff88]">V-STABLE</span></div>
        <div class="hidden sm:flex items-center gap-2">Global Nodes: <span class="text-white">12,842</span></div>
        <div class="hidden sm:flex items-center gap-2">Response: <span class="text-white">24ms</span></div>
        <div class="ml-auto text-[10px] opacity-40">SYSTEM RUNNING</div>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
